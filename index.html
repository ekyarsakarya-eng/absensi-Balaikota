<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Balaikota</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B0000">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
   .bg-merah { background: linear-gradient(135deg, #8B0000, #B22222); }
   .btn-hijau { background: linear-gradient(135deg, #16A34A, #22C55E); }
   .btn-disabled { background: #D1D5DB; color: #6B7280; cursor: not-allowed; }
  </style>
</head>
<body class="bg-gray-100 pb-20">
  <!-- Login Page -->
  <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
      <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Login Absensi</h1>
      <input id="username" type="text" placeholder="Username" class="w-full p-3 border border-gray-300 rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-red-700">
      <input id="password" type="password" placeholder="Password" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-red-700">
      <button onclick="login()" class="w-full bg-merah text-white p-3 rounded-lg font-bold">MASUK</button>
      <p id="loginError" class="text-red-600 text-sm mt-3 text-center hidden"></p>
    </div>
  </div>

  <!-- Main App -->
  <div id="appPage" class="hidden">
    <header class="bg-merah text-white p-4 flex justify-between items-center sticky top-0 z-10">
      <div>
        <p class="font-bold">Hi, <span id="namaUser"></span></p>
        <p class="text-sm" id="tanggal"></p>
      </div>
      <button onclick="logout()" class="text-sm bg-white/20 px-3 py-1 rounded">Logout</button>
    </header>

    <main class="p-4">
      <!-- Card Jam -->
      <div class="bg-merah text-white p-6 rounded-2xl mb-4 shadow-lg">
        <p id="statusAbsen" class="text-sm opacity-90">Belum Absen Masuk</p>
        <p class="text-5xl font-bold my-2" id="jamDigital">--:--:--</p>
        <p class="text-sm" id="statusLokasi">📍 Mendeteksi lokasi...</p>
      </div>

      <!-- Info Jam Masuk/Pulang -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-green-50 border border-green-200 p-4 rounded-xl">
          <p class="text-green-700 text-sm font-semibold">JAM MASUK</p>
          <p id="jamMasukText" class="text-2xl font-bold text-gray-800">--:--</p>
        </div>
        <div class="bg-red-50 border border-red-200 p-4 rounded-xl">
          <p class="text-red-700 text-sm font-semibold">JAM PULANG</p>
          <p id="jamPulangText" class="text-2xl font-bold text-gray-800">--:--</p>
        </div>
      </div>

      <!-- Tombol Absen -->
      <button id="btnMasuk" onclick="openKamera('masuk')" class="w-full btn-hijau text-white p-5 rounded-2xl mb-3 font-bold text-lg shadow-lg">
        Absen Masuk
      </button>
      <button id="btnPulang" onclick="openKamera('pulang')" class="w-full btn-disabled p-5 rounded-2xl mb-4 font-bold text-lg" disabled>
        Absen Pulang
      </button>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-10">
      <button class="text-red-700 font-bold flex flex-col items-center text-xs">
        <span class="text-xl">🏠</span>Home
      </button>
      <button onclick="showRekap()" class="text-gray-500 flex flex-col items-center text-xs">
        <span class="text-xl">📊</span>Rekap
      </button>
      <button class="text-gray-500 flex flex-col items-center text-xs">
        <span class="text-xl">🚶</span>Patroli
      </button>
      <button class="text-gray-500 flex flex-col items-center text-xs">
        <span class="text-xl">⚠️</span>Kejadian
      </button>
      <button class="text-gray-500 flex flex-col items-center text-xs">
        <span class="text-xl">📋</span>Pembinaan
      </button>
    </nav>
  </div>

  <!-- Modal Kamera -->
  <div id="kameraModal" class="hidden fixed inset-0 bg-black z-50">
    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
    <canvas id="canvas" class="hidden"></canvas>
    <div class="absolute top-4 left-4 bg-black/50 text-white px-4 py-2 rounded-lg">
      <p id="kameraInfo" class="font-bold">Absen Masuk</p>
      <p id="kameraJam" class="text-sm"></p>
    </div>
    <div class="absolute bottom-10 w-full flex justify-center gap-8">
      <button onclick="closeKamera()" class="bg-red-600 text-white rounded-full w-16 h-16 text-2xl">✕</button>
      <button onclick="takeSelfie()" class="bg-white rounded-full w-20 h-20 border-4 border-gray-300"></button>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl">
      <p class="font-bold">Mengirim data...</p>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
